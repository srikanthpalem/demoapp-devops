apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
      - name: demo-app
        image: 097893182002.dkr.ecr.ap-south-1.amazonaws.com/demo-app:latest
        ports:
        - containerPort: 8082